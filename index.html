<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pour Eva 💕</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card" id="mainCard">
  <p class="title-small">Pour toi,</p>
  <h1 class="title-big">Eva</h1>

  <div class="countdown" id="countdown">
    <div class="unit"><span class="unit-num" id="cd-days">000</span><span class="unit-label">Jours</span></div>
    <div class="unit"><span class="unit-num" id="cd-hours">00</span><span class="unit-label">Heures</span></div>
    <div class="unit"><span class="unit-num" id="cd-mins">00</span><span class="unit-label">Minutes</span></div>
    <div class="unit"><span class="unit-num" id="cd-secs">00</span><span class="unit-label">Secondes</span></div>
  </div>

  <p class="sub">avant notre premier anniversaire ensemble&nbsp;✨</p>
</div>

<div id="flash"></div>
<canvas id="fx-canvas"></canvas>

<div id="celebration">
  <div class="cele-ring">
    <p class="cele-title">Un an déjà&nbsp;! 🎉</p>
  </div>
  <p class="cele-sub">
    Un an de bonheur, de rires, de complicité…<br/>
    Tu comptes tellement pour moi, Eva.<br/>
    Joyeux anniversaire, mon amour.
  </p>
  <button class="btn-enter" onclick="window.location.href='lettre.html'">
    Découvrir ta surprise →
  </button>
</div>

<script src="js/index.js"></script>
</body>
</html>
